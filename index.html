<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATHNG | 智慧倉儲 ESL 監控系統</title>
    <style>
        :root {
            --bg-color: #050a14;
            --card-bg: #112240;
            --border-color: #233554;
            --text-main: #e6f1ff;
            --text-muted: #8892b0;
            --accent-green: #64ffda;
            --accent-pink: #ff00ea;
            --accent-blue: #00d4ff;
            --warning-red: #ff5555;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 頂部導覽列 */
        .top-nav {
            background-color: rgba(5, 10, 20, 0.95);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .nav-brand {
            color: var(--accent-green);
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-brand::before {
            content: '';
            width: 10px; height: 10px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 2s infinite;
        }

        .nav-tabs { display: flex; gap: 15px; }

        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: rgba(100, 255, 218, 0.1);
            color: var(--accent-green);
            border-color: var(--accent-green);
        }

        /* 內容區塊控制 */
        .view-section { display: none; padding: 30px; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* KPI 卡片樣式 */
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; }
        .kpi-title { color: var(--text-muted); font-size: 13px; margin-bottom: 10px; }
        .kpi-value { font-size: 28px; font-weight: bold; }
        .kpi-unit { font-size: 14px; color: var(--text-muted); }

        /* 畫布與日誌佈局 */
        .main-content { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .panel { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; }
        .panel h2 { margin-top: 0; font-size: 18px; color: var(--accent-blue); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        .canvas-container { background: #0a192f; border-radius: 8px; border: 1px solid var(--border-color); display: flex; justify-content: center; }
        .log-container { height: 350px; overflow-y: auto; font-family: monospace; font-size: 12px; }
        .log-item { padding: 5px 0; border-bottom: 1px dashed #233554; display: flex; gap: 8px; }
        .log-time { color: var(--accent-blue); }
        .log-msg-success { color: var(--accent-green); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-brand">SATHNG 智慧倉儲 ESL 系統</div>
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('arch')">架構展示</button>
            <button class="tab-btn" onclick="switchTab('dash')">即時戰情板</button>
        </div>
        <div id="clock" style="color: var(--text-muted); font-family: monospace;"></div>
    </nav>

    <div id="view-arch" class="view-section active">
        <div style="text-align: center;">
            <h2 style="color: var(--accent-green);">SATHNG 核心技術架構</h2>
            <div class="canvas-container">
                <canvas id="archCanvas" width="900" height="400"></canvas>
            </div>
            <p style="color: var(--text-muted); margin-top: 20px;">基於 AI Agent 與 ESL 電子標籤的動態數據校準系統</p>
        </div>
    </div>

    <div id="view-dash" class="view-section">
        <div class="dashboard-grid">
            <div class="kpi-card"><div class="kpi-title">帳料一致性</div><div class="kpi-value">98.7 <span class="kpi-unit">%</span></div></div>
            <div class="kpi-card"><div class="kpi-title">標籤在線率</div><div class="kpi-value">99.9 <span class="kpi-unit">%</span></div></div>
            <div class="kpi-card"><div class="kpi-title">待處理任務</div><div class="kpi-value">3 <span class="kpi-unit">單</span></div></div>
            <div class="kpi-card"><div class="kpi-title">今日 AI 校準</div><div class="kpi-value" id="ai-counter">142 <span class="kpi-unit">次</span></div></div>
        </div>
        <div class="main-content">
            <div class="panel">
                <h2>倉儲 PTL 視覺化監控</h2>
                <div class="canvas-container">
                    <canvas id="warehouseMap" width="700" height="350"></canvas>
                </div>
            </div>
            <div class="panel">
                <h2>SATHNG 系統日誌</h2>
                <div class="log-container" id="logBox"></div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            event.target.classList.add('active');
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW', { hour12: false });
        }
        setInterval(updateClock, 1000); updateClock();

        // --- 架構圖 Canvas ---
        const archCtx = document.getElementById('archCanvas').getContext('2d');
        function drawArch() {
            archCtx.clearRect(0,0,900,400);
            archCtx.strokeStyle = "#64ffda"; archCtx.lineWidth = 2;
            archCtx.strokeRect(350, 50, 200, 50);
            archCtx.fillStyle = "#fff"; archCtx.textAlign="center";
            archCtx.fillText("SATHNG Cloud Server", 450, 80);
            
            archCtx.beginPath(); archCtx.moveTo(450, 100); archCtx.lineTo(450, 200); archCtx.stroke();
            
            archCtx.strokeRect(350, 200, 200, 50);
            archCtx.fillText("AI Agent Engine", 450, 230);
            requestAnimationFrame(drawArch);
        }
        drawArch();

        // --- 倉儲圖 Canvas ---
        const whCtx = document.getElementById('warehouseMap').getContext('2d');
        function drawWH() {
            whCtx.clearRect(0,0,700,350);
            for(let i=0; i<40; i++) {
                whCtx.fillStyle = (i === 12 || i === 25) ? (Math.sin(Date.now()/200)>0 ? "#ff00ea" : "#333") : "#64ffda";
                whCtx.fillRect(50 + (i%8)*80, 50 + Math.floor(i/8)*60, 40, 20);
            }
            requestAnimationFrame(drawWH);
        }
        drawWH();

        // --- 日誌系統 ---
        const logBox = document.getElementById('logBox');
        function addLog() {
            const time = new Date().toLocaleTimeString('zh-TW', { hour12: false });
            logBox.insertAdjacentHTML('afterbegin', `<div class="log-item"><span class="log-time">[${time}]</span><span class="log-msg-success">SATHNG 系統正常運作中...</span></div>`);
            if(logBox.children.length > 15) logBox.lastChild.remove();
        }
        setInterval(addLog, 3000);
    </script>
</body>
</html>
